user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # ── SSL/TLS ──────────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Upstream: PenToolbox Flask (HTTPS) ───────────────────────────────────
    upstream pentoolbox_backend {
        server pentoolbox:5000;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name localhost *.localhost 127.0.0.1;

        # ── Certificats SSL (auto-signés, generés par pentoolbox) ────────────
        ssl_certificate /app/secrets/cert.pem;
        ssl_certificate_key /app/secrets/key.pem;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # ── Proxy vers PenToolbox ────────────────────────────────────────────
        location / {
            # IMPORTANT: Utilise HTTPS (ssl_verify_off car certificat auto-signé)
            proxy_pass https://pentoolbox_backend;
            proxy_ssl_verify off;
            proxy_ssl_verify_depth 1;

            # Headers de proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Timeouts
            # proxy_read_timeout aligne sur le timeout backend des scans nmap
            # (run_cmd timeout=180s, cf. app.py): a 60s, tout module exploit/scan
            # lent (http-enum, smb-vuln, ftp...) renvoyait un 504 nginx avant que
            # le backend ne puisse repondre (meme son message "timeout (180s)").
            # 200s laisse une marge au-dela des 180s applicatifs.
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 200s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 24 4k;
            proxy_busy_buffers_size 8k;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── OpenVAS GSA (interface web) ──────────────────────────────────────
        location /openvas {
            proxy_pass https://openvas:9392/;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
