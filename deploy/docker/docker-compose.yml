version: "3.9"
services:
  pentoolbox:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: pentoolbox
    ports:
      - "5000:5000"
    environment:
      DOCKER_ENV: "1"
      OPENVAS_HOST: "openvas"
      OPENVAS_PORT: "9390"
      MSF_RPC_HOST: "metasploit"
      MSF_RPC_PORT: "25553"
    volumes:
      - ../..:/app
      - ../../reports:/app/reports
      - ../../secrets:/app/secrets
      - gvmd_socket:/run/gvmd
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - metasploit
    networks:
      - pentoolbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 3

  openvas:
    image: immauss/openvas:26.05.15.01
    container_name: openvas
    ports:
      - "9390:9390"
      - "9392:9392"
    environment:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      TIMEZONE: Europe/Paris
      GVMD_ARGS: "--listen-mode=666"
    volumes:
      - openvas_data:/data
      - gvmd_socket:/run/gvmd
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - pentoolbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9392/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  metasploit:
    image: metasploitframework/metasploit-framework:latest
    container_name: metasploit
    ports:
      - "25553:55553"
    environment:
      MSF_RPC_PASSWORD: "msfpass"
    volumes:
      - msf_data:/home/msf/.msf4
    restart: unless-stopped
    networks:
      - pentoolbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:55553"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: ["./msfrpcd", "-P", "msfpass", "-S", "-a", "0.0.0.0", "-p", "55553", "-f"]

  pentoolbox-nginx:
    image: nginx:alpine
    container_name: pentoolbox-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../secrets:/app/secrets:ro
    restart: unless-stopped
    depends_on:
      - pentoolbox
    networks:
      - pentoolbox-net

volumes:
  openvas_data:
  msf_data:
  gvmd_socket:

networks:
  pentoolbox-net:
    driver: bridge
